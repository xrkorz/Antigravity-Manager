name: Sync Fork V2

on:
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-fork-v2.yml'
      - '.github/upstream-sync-state.json'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_FORK_TOKEN }}
          fetch-depth: 0

      - name: Compare upstream with recorded state
        id: compare
        env:
          SYNC_FORK_TOKEN: ${{ secrets.SYNC_FORK_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${SYNC_FORK_TOKEN}@github.com/xrkorz/Antigravity-Manager.git
          git remote add upstream https://github.com/lbjlaq/Antigravity-Manager.git 2>/dev/null || git remote set-url upstream https://github.com/lbjlaq/Antigravity-Manager.git
          git fetch origin main
          git fetch upstream main
          UPSTREAM_SHA=$(git rev-parse upstream/main)
          STATE_SHA=$(python3 -c 'import json, pathlib; p=pathlib.Path(".github/upstream-sync-state.json"); print(json.loads(p.read_text()).get("upstream_sha", "") if p.exists() else "")')
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          if [ "$UPSTREAM_SHA" = "$STATE_SHA" ] && [ -n "$STATE_SHA" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream changes detected or state missing."
          fi

      - name: Backup current main
        if: steps.compare.outputs.changed == 'true'
        env:
          SYNC_FORK_TOKEN: ${{ secrets.SYNC_FORK_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin https://x-access-token:${SYNC_FORK_TOKEN}@github.com/xrkorz/Antigravity-Manager.git
          git fetch origin main
          git checkout -B main origin/main
          git branch -f backup-main origin/main
          git push origin backup-main --force

      - name: Sync from upstream and restore managed files
        if: steps.compare.outputs.changed == 'true'
        env:
          SYNC_FORK_TOKEN: ${{ secrets.SYNC_FORK_TOKEN }}
          UPSTREAM_SHA: ${{ steps.compare.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/sync-fork-backup
          cp .github/workflows/sync-fork-v2.yml /tmp/sync-fork-backup/sync-fork-v2.yml
          cp .github/upstream-sync-state.json /tmp/sync-fork-backup/upstream-sync-state.json 2>/dev/null || true
          git remote set-url origin https://x-access-token:${SYNC_FORK_TOKEN}@github.com/xrkorz/Antigravity-Manager.git
          git fetch upstream main
          git checkout -B main origin/main
          git reset --hard upstream/main
          mkdir -p .github/workflows .github
          cp /tmp/sync-fork-backup/sync-fork-v2.yml .github/workflows/sync-fork-v2.yml
          python3 - <<'PY2'
import json, os, pathlib
path = pathlib.Path('.github/upstream-sync-state.json')
path.write_text(json.dumps({
  'upstream': 'lbjlaq/Antigravity-Manager',
  'branch': 'main',
  'upstream_sha': os.environ['UPSTREAM_SHA']
}, indent=2) + '\n')
PY2
          git add .github/workflows/sync-fork-v2.yml .github/upstream-sync-state.json
          git commit -m "chore: preserve fork sync workflow metadata"
          git push origin HEAD:main --force

      - name: Report skipped sync
        if: steps.compare.outputs.changed != 'true'
        run: echo "backup-main unchanged because upstream SHA matches recorded sync state"
